name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_BAY_08D174E00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./client" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
        env:
          VITE_FIREBASE_APIKEY: "AIzaSyCNhsnhCsFgs7IQ00y4ZjJbcwtxOxJ4gaY"
          VITE_FIREBASE_AUTH_DOMAIN: "aiexamnotes.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "aiexamnotes"
          VITE_FIREBASE_STORAGE_BUCKET: "aiexamnotes.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "198091553006"
          VITE_FIREBASE_APP_ID: "1:198091553006:web:cd719d4ee1ebf391139bff"
          VITE_STRIPE_Publishable_Key: "pk_test_51TETyeALRVTUbwk9qlG4XPKDit8P5saE5BIQgXQKazTHv9raEnJge9CRd3nrYptAotDEh410uKsWQsk61wEResAW00xCpqCFKL"
          VITE_BACKEND_URL: "https://ainotes-gnaxbqehd3cegzb0.centralindia-01.azurewebsites.net"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_BAY_08D174E00 }}
          action: "close"
